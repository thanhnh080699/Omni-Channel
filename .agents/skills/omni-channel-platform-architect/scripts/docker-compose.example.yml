services:
  api:
    build:
      context: ../../../../backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_PORT: ${API_PORT:-8080}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/omni_channel}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://omni:CHANGE_ME_RABBITMQ_PASSWORD@rabbitmq:5672/}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_JWT_SECRET}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://cdn:8081}
      CDN_API_KEY: ${CDN_API_KEY:-CHANGE_ME_CDN_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - omni-channel
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../../../../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-ws://localhost:8080/socket}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - omni-channel

  worker-inbound:
    build:
      context: ../../../../backend
    command: ["./worker", "inbound"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/omni_channel}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://omni:CHANGE_ME_RABBITMQ_PASSWORD@rabbitmq:5672/}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://cdn:8081}
      CDN_API_KEY: ${CDN_API_KEY:-CHANGE_ME_CDN_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni-channel

  worker-outbound:
    build:
      context: ../../../../backend
    command: ["./worker", "outbound"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/omni_channel}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://omni:CHANGE_ME_RABBITMQ_PASSWORD@rabbitmq:5672/}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://cdn:8081}
      CDN_API_KEY: ${CDN_API_KEY:-CHANGE_ME_CDN_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni-channel

  worker-media:
    build:
      context: ../../../../backend
    command: ["./worker", "media"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/omni_channel}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://omni:CHANGE_ME_RABBITMQ_PASSWORD@rabbitmq:5672/}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://cdn:8081}
      CDN_API_KEY: ${CDN_API_KEY:-CHANGE_ME_CDN_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      cdn:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni-channel

  cdn:
    build:
      context: ../../../../cdn
    environment:
      PORT: 8081
      UPLOAD_DIR: /app/medias
      CACHE_DIR: /app/medias/cache
      API_KEY: ${CDN_API_KEY:-CHANGE_ME_CDN_API_KEY}
      BASE_URL: ${CDN_BASE_URL:-http://localhost:8081}
      REQUIRE_SIGNATURE: ${CDN_REQUIRE_SIGNATURE:-false}
    volumes:
      - cdn_media:/app/medias
    ports:
      - "${CDN_PORT:-8081}:8081"
    restart: unless-stopped
    networks:
      - omni-channel
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    restart: unless-stopped
    networks:
      - omni-channel
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-omni}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-CHANGE_ME_RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    restart: unless-stopped
    networks:
      - omni-channel
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - omni-channel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - frontend
      - cdn
    ports:
      - "${HTTP_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - omni-channel

volumes:
  mongo_data:
  rabbitmq_data:
  redis_data:
  cdn_media:

networks:
  omni-channel:
    driver: bridge
